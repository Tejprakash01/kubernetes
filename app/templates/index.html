<!DOCTYPE html>
<html>
<head>
    <title>Mongo Name Saver</title>
</head>
<body>

    <h1>Save Names to MongoDB</h1>

    <form method="POST">
        <input
            type="text"
            name="name"
            placeholder="Enter Name"
            required
        >

        <button type="submit">
            Save
        </button>
    </form>

    <hr>

    <h2>Saved Names</h2>

    <ul>
        {% for user in users %}
        <li>{{ user.name }}</li>
        {% endfor %}
    </ul>

</body>
</html>
