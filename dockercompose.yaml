version: '3.8'

services:

  mongo:
    image: mongo:7
    container_name: mongo
    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

  flask-app:
    build: .

    container_name: flask-app

    ports:
      - "5000:5000"

    depends_on:
      - mongo

    environment:
      - MONGO_URI=mongodb://mongo:27017/

volumes:
  mongo-data: